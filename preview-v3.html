const renderText = (text) => {
  if (!text) return null;
  return text.split(/(\*\*.*?\*\*)/g).map((part, i) => {
    if (part.startsWith("**") && part.endsWith("**")) {
      return React.createElement("strong", { key: i, style: { fontWeight: "600", color: t.text900 } }, part.slice(2, -2));
    }
    return part;
  });
};

const SkillDiffCard = ({ card }) => {
  const parseSkillSteps = (text) => {
    const lines = text.split(/\n+/);
    const steps = [];
    let currentStep = null;
    
    lines.forEach((line) => {
      if (line.includes('**WHEN**')) {
        if (currentStep) steps.push(currentStep);
        currentStep = { type: 'when', title: line.replace(/\*\*WHEN\*\*:\s*/, '').trim(), body: '' };
      } else if (/^\*\*\d+\./.test(line)) {
        if (currentStep) steps.push(currentStep);
        const match = line.match(/^\*\*(\d+)\.\s*([^*]+)\*\*(.*)/);
        if (match) {
          currentStep = { type: 'step', number: match[1], title: match[2].trim(), body: match[3].trim() };
        }
      } else if (currentStep && line.trim()) {
        currentStep.body += (currentStep.body ? ' ' : '') + line.trim();
      }
    });
    if (currentStep) steps.push(currentStep);
    return steps;
  };

  const steps = useMemo(() => parseSkillSteps(card.after), [card.after]);

  return React.createElement(
    "div",
    {
      style: {

// ERROR BOUNDARY (class component required for componentDidCatch)
// ═══════════════════════════════════════════════════════════════════════════════════

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, errorInfo: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, info) {
    console.error("Prototype Error:", error, info);
    this.setState({ errorInfo: info });
  }
  render() {
    if (this.state.hasError) {
      return React.createElement(
        "div",
        { style: { padding: "40px", fontFamily: "monospace", maxWidth: "800px" } },
        React.createElement("h2", { style: { color: "#d32f2f", marginBottom: "16px" } }, "Something went wrong"),
        React.createElement("p", { style: { marginBottom: "8px", fontSize: "14px" } }, String(this.state.error)),
        React.createElement("pre", { style: { background: "#f5f5f5", padding: "16px", borderRadius: "8px", overflow: "auto", fontSize: "11px", maxHeight: "300px", marginBottom: "16px", whiteSpace: "pre-wrap" } },
          (this.state.error && this.state.error.stack ? this.state.error.stack : "") + "\n\nComponent Stack:" + (this.state.errorInfo && this.state.errorInfo.componentStack ? this.state.errorInfo.componentStack : "")
        ),
        React.createElement("button", {
          onClick: () => this.setState({ hasError: false, error: null, errorInfo: null }),
          style: { padding: "8px 16px", background: "#7E55F6", color: "white", border: "none", borderRadius: "6px", cursor: "pointer", fontSize: "14px" }
        }, "Try again")
      );
    }
    return this.props.children;
  }
}

// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════════════

const App = () => {
  const [view, setView] = useState("landing");
  const [activeFlowIdx, setActiveFlowIdx] = useState(0);
  const [completedFlows, setCompletedFlows] = useState([]);
  
  const handleFlowComplete = () => {
    if (!completedFlows.includes(activeFlowIdx)) {
      setCompletedFlows(prev => [...prev, activeFlowIdx]);
    }
  };

  return React.createElement(
    "div",
    { style: { display: "flex", height: "100vh", backgroundColor: t.pageBg, fontFamily: "'Inter', sans-serif" } },
    React.createElement(IconNavBar, { activeFlowId: FLOWS[activeFlowIdx]?.id }),
    React.createElement(
      ErrorBoundary,
      null,
      React.createElement(
        "div",
        { style: { flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" } },
        view === "landing" && React.createElement(LandingPage, {
          onSelectFlow: (idx) => {
            setActiveFlowIdx(idx);
            setView("flow");
          },
        }),
        view === "flow" && React.createElement(FlowView, {
          flow: FLOWS[activeFlowIdx],
          onBack: () => setView("landing"),
          onFlowComplete: handleFlowComplete,
          completedFlows: completedFlows,
        })
      )
    )
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
