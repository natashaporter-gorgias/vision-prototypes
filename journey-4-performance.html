<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gorgias AI Agent — Journey 4: E2E Performance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fafafa; color: #1e242e; overflow: hidden; }

    /* Layout */
    .container { display: flex; height: 100vh; }

    /* Sidebar — full text nav matching screenshot */
    .sidebar { width: 220px; background: #fff; border-right: 1px solid #00000014; display: flex; flex-direction: column; padding: 16px 0; flex-shrink: 0; transition: width 280ms cubic-bezier(0.22, 1, 0.36, 1); overflow: hidden; }
    .sidebar-top { display: flex; align-items: center; justify-content: space-between; padding: 0 16px 16px; white-space: nowrap; }
    .sidebar-logo { display: flex; align-items: center; gap: 8px; }
    .sidebar-logo svg { width: 24px; height: 24px; flex-shrink: 0; }
    .sidebar-logo-text { font-size: 14px; font-weight: 600; color: #1e242e; transition: opacity 200ms; }
    .sidebar-icons { display: flex; gap: 4px; transition: opacity 200ms; }
    .sidebar-icon-btn { width: 28px; height: 28px; border: none; background: transparent; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #5c6370; transition: all 120ms; }
    .sidebar-icon-btn:hover { background: #f5f6f7; color: #1e242e; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 8px; flex: 1; }
    .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; color: #5c6370; cursor: pointer; transition: all 120ms; border: none; background: none; width: 100%; text-align: left; font-family: 'Inter', sans-serif; white-space: nowrap; overflow: hidden; }
    .sidebar-item:hover { background: #f5f6f7; color: #1e242e; }
    .sidebar-item.active { background: #f1ecff; color: #7E55F6; }
    .sidebar-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-section-label { font-size: 11px; font-weight: 500; color: #a0a0b0; letter-spacing: 0.03em; padding: 16px 12px 6px; white-space: nowrap; transition: opacity 200ms; }
    .sidebar-recent { font-size: 13px; font-weight: 400; color: #5c6370; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 120ms; white-space: nowrap; overflow: hidden; }
    .sidebar-recent:hover { background: #f5f6f7; color: #1e242e; }
    .sidebar-bottom { padding: 12px 16px; border-top: 1px solid #f0f0f4; margin-top: auto; white-space: nowrap; overflow: hidden; }
    .sidebar-user { display: flex; align-items: center; gap: 10px; }
    .sidebar-avatar { width: 28px; height: 28px; border-radius: 50%; background: #7E55F6; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #fff; position: relative; flex-shrink: 0; }
    .sidebar-avatar-dot { position: absolute; bottom: -1px; right: -1px; width: 8px; height: 8px; border-radius: 50%; background: #22c55e; border: 2px solid #fff; }

    /* Sidebar collapsed state */
    .sidebar.collapsed { width: 56px; }
    .sidebar.collapsed .sidebar-top { justify-content: center; padding: 0 0 16px; }
    .sidebar.collapsed .sidebar-logo-text,
    .sidebar.collapsed .sidebar-icons,
    .sidebar.collapsed .sidebar-section-label,
    .sidebar.collapsed .sidebar-recent,
    .sidebar.collapsed .sidebar-user span { opacity: 0; width: 0; overflow: hidden; pointer-events: none; }
    .sidebar.collapsed .sidebar-nav { padding: 0 8px; }
    .sidebar.collapsed .sidebar-item { justify-content: center; padding: 8px; gap: 0; }
    .sidebar.collapsed .sidebar-bottom { padding: 12px 14px; display: flex; justify-content: center; }
    .sidebar.collapsed .sidebar-user { justify-content: center; }
    .sidebar.collapsed .sidebar-logo { gap: 0; }

    /* Main content area */
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* Home view — single wide panel */
    .home-view { flex: 1; overflow-y: auto; background: #fff; border-radius: 0; }
    .home-inner { max-width: 960px; margin: 0 auto; padding: 40px 48px 60px; }
    .home-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .home-audio { display: flex; justify-content: center; margin-bottom: 24px; }
    .home-ask-wrap { margin-bottom: 32px; }
    .home-divider { height: 1px; background: #f0f0f4; margin-bottom: 28px; }
    .home-metrics { display: flex; gap: 16px; margin-bottom: 32px; }
    .home-insights-header { margin-bottom: 16px; }
    .home-insights { display: flex; flex-direction: column; gap: 14px; }

    /* Task view — two-panel split (hidden on home) */
    .task-view { flex: 1; display: flex; overflow: hidden; }
    .left-panel { width: 487px; background: #fafafa; display: flex; flex-direction: column; padding: 8px; overflow: hidden; position: relative; }
    .left-inner { background: #fff; border-radius: 16px; border: 1px solid #00000014; flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .left-frosted-header { position: absolute; top: 0; left: 0; right: 0; z-index: 10; background: linear-gradient(#ffffff 0%, #ffffffb2 100%); backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px); padding: 24px; display: flex; align-items: center; min-height: 80px; }
    .left-body { flex: 1; display: flex; flex-direction: column; padding: 0; overflow: hidden; }
    .left-body-top { padding-top: 56px; }
    .left-body-content { flex: 1; display: flex; flex-direction: column; gap: 16px; justify-content: flex-end; padding: 16px 24px; overflow: hidden; }
    .left-body-input { flex-shrink: 0; padding: 12px 24px 24px; background: #fff; border-top: 1px solid #f0f0f4; }
    .right-panel { flex: 1; background: #fafafa; padding: 8px; overflow: hidden; }
    .right-inner { background: #fff; border-radius: 16px; border: 1px solid #00000014; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
    .right-header { padding: 24px; height: 80px; display: flex; align-items: center; }
    .right-body { flex: 1; overflow-y: auto; padding: 32px 24px; display: flex; flex-direction: column; gap: 24px; }

    /* Typography */
    .heading-xxl { font-size: 24px; line-height: 32px; font-weight: 600; }
    .heading-xl { font-size: 20px; line-height: 32px; font-weight: 600; }
    .heading-md { font-size: 16px; line-height: 24px; font-weight: 600; }
    .heading-sm { font-size: 14px; line-height: 20px; font-weight: 600; }
    .medium-md { font-size: 14px; line-height: 20px; font-weight: 500; }
    .regular-md { font-size: 14px; line-height: 20px; font-weight: 400; }
    .bold-sm { font-size: 12px; line-height: 16px; font-weight: 600; letter-spacing: 0.01em; }
    .regular-sm { font-size: 12px; line-height: 16px; font-weight: 400; letter-spacing: 0.01em; }

    /* Colors */
    .text-secondary { color: #5c6370; }
    .text-tertiary { color: #6e7686; }

    /* Home Screen */
    .greeting { margin-bottom: 6px; }
    .subtitle { color: #5c6370; margin-bottom: 24px; }

    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-card { background: #fff; border: 1px solid #00000014; border-radius: 8px; padding: 12px 16px; cursor: pointer; transition: all 150ms cubic-bezier(0.9, 0, 0, 1); box-shadow: 0px 2px 20px 0px rgba(0,0,0,0.04); animation: fadeInUp 400ms cubic-bezier(0.6, 0, 0, 1) backwards; }
    .task-card:hover { border-color: #7E55F6; box-shadow: 0px 2px 20px 0px rgba(0,0,0,0.08); }
    .task-title { font-size: 14px; font-weight: 600; line-height: 20px; margin-bottom: 4px; }
    .task-desc { font-size: 12px; line-height: 16px; letter-spacing: 0.01em; color: #5c6370; }

    .input-card { background: #fff; border: 1px solid #00000014; border-radius: 8px; padding: 12px 16px; }
    .input-card-text { font-size: 14px; color: #5c6370; line-height: 20px; margin-bottom: 24px; }
    .input-card-buttons { display: flex; justify-content: space-between; align-items: center; }
    .input-icon-btn { width: 24px; height: 24px; border-radius: 6px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 150ms cubic-bezier(0.9, 0, 0, 1); }
    .input-icon-btn.light { background: rgba(255,255,255,0.5); border: 0.5px solid rgba(103,113,131,0.5); box-shadow: 0px 2px 3px 0px rgba(0,0,0,0.05); }
    .input-icon-btn.light:hover { border-color: #7E55F6; }
    .input-icon-btn.dark { background: #1e242e; box-shadow: 0px 2px 3px 0px rgba(0,0,0,0.05); opacity: 0.5; }
    .input-icon-btn.dark:hover { opacity: 0.8; }

    /* Metric Cards */
    .metrics-grid { display: flex; gap: 16px; flex-wrap: wrap; }
    .metric-card { flex: 1; min-width: 120px; background: #fff; border-radius: 12px; padding: 24px; border: 1px solid #00000014; box-shadow: 0px 2px 20px 0px rgba(0,0,0,0.04); animation: fadeInUp 400ms cubic-bezier(0.6, 0, 0, 1) backwards; }
    .metric-label-row { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
    .metric-label { font-size: 12px; font-weight: 500; line-height: 16px; letter-spacing: 0.01em; color: #5c6370; }
    .metric-info { width: 16px; height: 16px; color: #5c6370; }
    .metric-stats { display: flex; align-items: center; gap: 4px; }
    .metric-value { font-size: 24px; font-weight: 600; line-height: 32px; }
    .metric-delta { display: inline-flex; align-items: center; gap: 2px; padding: 1px 4px 1px 2px; border-radius: 4px; }
    .metric-delta svg { width: 12px; height: 12px; }
    .metric-delta span { font-size: 12px; font-weight: 500; line-height: 16px; letter-spacing: 0.01em; }

    /* Story Cards */
    .story-card { background: #fff; border-radius: 12px; padding: 20px 24px; border: 1px solid #00000014; box-shadow: 0px 2px 20px 0px rgba(0,0,0,0.04); animation: fadeInUp 400ms cubic-bezier(0.6, 0, 0, 1) backwards; }
    .story-label { display: inline-block; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; margin-bottom: 12px; }
    .story-label.insight { background: #f1ecff; color: #7E55F6; }
    .story-label.evidence { background: #fef3e2; color: #b45309; }
    .story-label.proposal { background: #e8f4fd; color: #1d6fad; }
    .story-label.evaluation { background: #e8f4fd; color: #1d6fad; }
    .story-label.review { background: #fef3e2; color: #b45309; }
    .story-label.improved { background: #e9fbf5; color: #147656; }
    .story-label.scorers { background: #f1ecff; color: #7E55F6; }
    .story-label.experiment { background: #e8f4fd; color: #1d6fad; }
    .story-label.result { background: #e9fbf5; color: #147656; }
    .story-label.critique { background: #fde8ec; color: #c4314b; }
    .story-label.opportunity { background: #f1ecff; color: #7E55F6; }
    .story-card .story-title { font-size: 14px; font-weight: 600; line-height: 20px; margin-bottom: 4px; }
    .story-card .story-title-xl { font-size: 24px; font-weight: 600; line-height: 30px; letter-spacing: -0.01em; color: #1e242e; margin-bottom: 4px; }

    /* Verdict card */
    .verdict-banner { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #f0fbf6; border: 1px solid #b8ecd8; border-radius: 10px; margin-bottom: 16px; }
    .verdict-banner.caution { background: #fef6e7; border-color: #f5d68a; }
    .verdict-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; font-size: 14px; font-weight: 700; }
    .verdict-icon.ok { background: #147656; }
    .verdict-icon.caution { background: #b45309; }
    .verdict-label { font-size: 13px; font-weight: 600; color: #1e242e; }
    .verdict-sub { font-size: 13px; color: #5c6370; margin-left: 4px; }

    .impact-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .impact-stat { background: #fff; border: 1px solid #e8e8ec; border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 2px; }
    .impact-stat.better { border-left: 3px solid #147656; }
    .impact-stat.worse { border-left: 3px solid #9ca3af; }
    .impact-stat.review { border-left: 3px solid #b45309; }
    .impact-value { font-size: 22px; font-weight: 600; color: #1e242e; line-height: 28px; }
    .impact-label { font-size: 12px; color: #5c6370; }

    /* Eval metric cards (pass rate / regressions / improvements / new failures) */
    .eval-metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .eval-metric-card { background: #fff; border: 1px solid #e8e8ec; border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
    .eval-metric-card.warn { background: #fef6e7; border-color: #f5d68a; }
    .eval-metric-label { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #5c6370; }
    .eval-metric-value { font-size: 24px; font-weight: 600; color: #1e242e; line-height: 30px; display: flex; align-items: baseline; gap: 8px; }
    .eval-metric-baseline { font-size: 11px; font-weight: 500; color: #8a8f98; letter-spacing: 0; text-transform: none; }
    .eval-metric-delta { font-size: 11px; font-weight: 500; color: #147656; display: flex; align-items: center; gap: 3px; }
    .eval-metric-delta.positive { color: #147656; }
    .eval-metric-delta.warn { color: #b45309; }

    .score-dist-inline { margin-top: 4px; padding: 12px 14px; background: #fafafa; border: 1px solid #e8e8ec; border-radius: 10px; }
    .score-dist-label { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #5c6370; margin-bottom: 8px; }

    /* Status pill + title row */
    .eval-title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .eval-title-row .story-title-xl { margin-bottom: 0; }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 999px; border: 1px solid #e8e8ec; background: #fff; color: #5c6370; }
    .status-pill.review { background: #fef6e7; border-color: #f5d68a; color: #8b4a00; }
    .status-pill.review::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #b45309; }
    .status-pill.ok { background: #e9fbf5; border-color: #b8ecd8; color: #0f5a3f; }
    .status-pill.ok::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: #147656; }

    /* Explain link (entry-point into left-panel conversation) */
    .explain-link { display: inline-flex; align-items: center; gap: 4px; margin-top: 6px; font-size: 12px; font-weight: 500; color: #7E55F6; background: none; border: none; padding: 0; cursor: pointer; font-family: inherit; }
    .explain-link:hover { color: #5a3dd2; text-decoration: underline; }
    .explain-link svg { width: 10px; height: 10px; transition: transform 120ms; }
    .explain-link:hover svg { transform: translateX(2px); }

    /* Test set card */
    .test-set-card { margin-top: 16px; padding: 16px 18px; background: #fafafa; border: 1px solid #e8e8ec; border-radius: 10px; }
    .test-set-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
    .test-set-title { font-size: 13px; font-weight: 600; color: #1e242e; letter-spacing: 0.01em; }
    .test-set-meta { font-size: 12px; color: #5c6370; }
    .test-set-bars { display: flex; flex-direction: column; gap: 6px; }
    .test-set-bar { display: grid; grid-template-columns: 1fr auto; grid-template-rows: auto auto; gap: 2px 12px; align-items: center; }
    .test-set-bar-label { font-size: 12px; color: #1e242e; grid-column: 1; grid-row: 1; }
    .test-set-bar-count { font-size: 12px; color: #5c6370; font-variant-numeric: tabular-nums; grid-column: 2; grid-row: 1; }
    .test-set-bar-fill { height: 4px; border-radius: 2px; grid-column: 1 / span 2; grid-row: 2; display: block; min-width: 2px; }
    .story-card .story-body { font-size: 14px; line-height: 22px; color: #5c6370; }
    .story-card .story-body strong { color: #1e242e; font-weight: 600; }
    .story-stat-row { display: flex; gap: 24px; margin-top: 12px; }
    .story-stat { text-align: center; }
    .story-stat-value { font-size: 20px; font-weight: 600; line-height: 28px; }
    .story-stat-label { font-size: 12px; color: #5c6370; letter-spacing: 0.01em; }

    /* Conversation */
    .conversation { display: flex; flex-direction: column; gap: 16px; }
    .message { animation: fadeInUp 400ms cubic-bezier(0.6, 0, 0, 1); }
    .agent-msg { color: #1e242e; line-height: 1.6; }
    .user-bubble { display: inline-block; background: #EBECEF; color: #1e242e; padding: 8px 14px; border-radius: 16px 16px 4px 16px; max-width: 85%; font-size: 14px; font-weight: 500; animation: scaleUp 350ms cubic-bezier(0.22, 1, 0.36, 1); }
    .message-user { text-align: right; }

    .prompt-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .prompt-btn { background: white; border: 1px solid #d0d4da; border-radius: 6px; padding: 0 12px; height: 32px; font-size: 14px; font-weight: 500; line-height: 20px; text-align: left; cursor: pointer; box-shadow: 0px 2px 3px 0px rgba(0,0,0,0.05); transition: all 150ms cubic-bezier(0.9, 0, 0, 1); animation: fadeInUp 400ms cubic-bezier(0.6, 0, 0, 1) backwards; font-family: 'Inter', sans-serif; }
    .prompt-btn:hover { border-color: #7E55F6; background: #f1ecff; }

    /* Decision card — list-style picker for mutually-exclusive actions */
    .decision-card { background: #fff; border: 1px solid #e8e8ec; border-radius: 10px; margin-top: 12px; overflow: hidden; box-shadow: 0px 2px 4px 0px rgba(0,0,0,0.04); animation: fadeInUp 400ms cubic-bezier(0.6, 0, 0, 1); font-family: 'Inter', sans-serif; }
    .decision-card-title { font-size: 13px; font-weight: 600; color: #1e242e; padding: 12px 16px 10px; border-bottom: 1px solid #f0f0f4; }
    .decision-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f0f0f4; transition: background 120ms; text-align: left; background: #fff; border-left: none; border-right: none; border-top: none; width: 100%; font-family: inherit; }
    .decision-row:last-child { border-bottom: none; }
    .decision-row:hover:not(.dimmed):not(.completed) { background: #f8f5ff; }
    .decision-row-icon { width: 28px; height: 28px; border-radius: 8px; background: #f1ecff; color: #7E55F6; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; line-height: 1; }
    .decision-row-content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .decision-row-label { font-size: 13px; font-weight: 600; color: #1e242e; line-height: 18px; margin-bottom: 2px; }
    .decision-row-desc { font-size: 12px; color: #5c6370; line-height: 16px; }
    .decision-row-chev { color: #a0a4ad; flex-shrink: 0; align-self: center; }
    .decision-row.dimmed { background: #fafafa; }
    .decision-row.dimmed .decision-row-icon { background: #f0f0f4; color: #a0a4ad; }
    .decision-row.dimmed .decision-row-label { color: #5c6370; font-weight: 500; }
    .decision-row.dimmed .decision-row-desc { color: #a0a4ad; }
    .decision-row.completed { cursor: default; background: #f5fbf7; }
    .decision-row.completed .decision-row-icon { background: #d7ecd7; color: #147656; }
    .decision-row.completed .decision-row-label { color: #5c6370; }
    .decision-row.completed .decision-row-desc { color: #8a8f97; }

    /* Skill side-by-side diff (Beat 3.5) */
    .skill-diff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .skill-diff-col { border: 1px solid #e8e8ec; border-radius: 8px; overflow: hidden; background: #fff; display: flex; flex-direction: column; }
    .skill-diff-col.proposed { border-color: #d7ecd7; }
    .skill-diff-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #fafafa; border-bottom: 1px solid #f0f0f4; }
    .skill-diff-col.proposed .skill-diff-header { background: #f5fbf7; border-bottom-color: #d7ecd7; }
    .skill-diff-version { font-size: 12px; font-weight: 600; color: #1e242e; }
    .skill-diff-tag { font-size: 10px; font-weight: 600; color: #5c6370; padding: 2px 6px; background: #f0f0f4; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .skill-diff-tag.added { background: #d7ecd7; color: #147656; }
    .skill-diff-body { padding: 12px 14px; flex: 1; }
    .skill-diff-body pre { margin: 0; font-family: 'Menlo', 'Monaco', 'Consolas', monospace; font-size: 11px; line-height: 17px; color: #1e242e; white-space: pre-wrap; }
    .diff-line-add { display: block; background: #e7f5ec; border-left: 2px solid #147656; padding: 2px 8px; margin: 3px -8px; color: #146449; border-radius: 2px; }
    .skill-diff-footer { margin-top: 14px; padding-top: 12px; border-top: 1px solid #f0f0f4; font-size: 12px; color: #5c6370; display: flex; gap: 16px; flex-wrap: wrap; }
    .skill-diff-footer strong { color: #1e242e; font-weight: 600; }

    /* Multi-select scorer card (post re-run) */
    .multiselect-card { background: #fff; border: 1px solid #e8e8ec; border-radius: 10px; margin-top: 12px; overflow: hidden; box-shadow: 0px 2px 4px 0px rgba(0,0,0,0.04); animation: fadeInUp 400ms cubic-bezier(0.6, 0, 0, 1); font-family: 'Inter', sans-serif; }
    .multiselect-title { font-size: 13px; font-weight: 600; color: #1e242e; padding: 12px 16px 10px; border-bottom: 1px solid #f0f0f4; }
    .multiselect-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f0f0f4; transition: background 120ms; background: #fff; }
    .multiselect-row:last-of-type { border-bottom: 1px solid #f0f0f4; }
    .multiselect-row:hover { background: #f8f5ff; }
    .multiselect-checkbox { width: 18px; height: 18px; border: 1.5px solid #c0c4cc; border-radius: 4px; background: #fff; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 120ms; }
    .multiselect-row.checked .multiselect-checkbox { background: #7E55F6; border-color: #7E55F6; }
    .multiselect-checkbox svg { opacity: 0; transition: opacity 120ms; }
    .multiselect-row.checked .multiselect-checkbox svg { opacity: 1; }
    .multiselect-content { flex: 1; min-width: 0; }
    .multiselect-label { font-size: 13px; font-weight: 600; color: #1e242e; line-height: 18px; margin-bottom: 2px; }
    .multiselect-desc { font-size: 12px; color: #5c6370; line-height: 16px; }
    .multiselect-badge { font-size: 10px; font-weight: 600; color: #7E55F6; background: #f1ecff; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em; margin-left: 8px; }
    .multiselect-actions { display: flex; align-items: center; justify-content: flex-end; gap: 12px; padding: 12px 16px; background: #fafafa; border-top: 1px solid #f0f0f4; }
    .multiselect-secondary { background: transparent; border: none; color: #5c6370; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; padding: 0 8px; height: 32px; border-radius: 6px; }
    .multiselect-secondary:hover { color: #1e242e; background: #f0f0f4; }
    .multiselect-primary { background: #1e242e; color: #fff; border: none; padding: 0 16px; height: 32px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 120ms; }
    .multiselect-primary:hover { background: #000; }

    /* Slack toast notification (fires on "3 weeks later…") */
    .slack-toast { position: fixed; top: 20px; right: 20px; width: 360px; background: #fff; border: 1px solid #e8e8ec; border-radius: 10px; box-shadow: 0 12px 32px rgba(0,0,0,0.16), 0 4px 8px rgba(0,0,0,0.06); padding: 12px 14px; z-index: 10000; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; transform: translateX(400px); opacity: 0; transition: transform 380ms cubic-bezier(0.22, 1, 0.36, 1), opacity 260ms ease; }
    .slack-toast.show { transform: translateX(0); opacity: 1; }
    .slack-toast-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .slack-toast-app-icon { width: 22px; height: 22px; border-radius: 5px; background: #4A154B; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .slack-toast-app-name { font-size: 12px; font-weight: 700; color: #1e242e; }
    .slack-toast-channel { font-size: 12px; color: #5c6370; }
    .slack-toast-time { font-size: 11px; color: #8a8f97; margin-left: auto; }
    .slack-toast-body { display: flex; gap: 10px; }
    .slack-toast-avatar { width: 34px; height: 34px; border-radius: 6px; background: linear-gradient(135deg, #7E55F6 0%, #5b3fd1 100%); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .slack-toast-content { flex: 1; min-width: 0; }
    .slack-toast-sender { font-size: 13px; font-weight: 700; color: #1e242e; margin-bottom: 2px; }
    .slack-toast-msg { font-size: 13px; color: #1e242e; line-height: 18px; }
    .slack-toast-msg strong { font-weight: 600; }
    .slack-toast-close { position: absolute; top: 8px; right: 8px; background: transparent; border: none; color: #a0a4ad; cursor: pointer; padding: 4px; line-height: 0; border-radius: 4px; }
    .slack-toast-close:hover { background: #f0f0f4; color: #5c6370; }

    /* Business Outcomes hero stats (Beat 7) */
    .outcomes-hero { display: flex; align-items: stretch; gap: 0; margin-top: 8px; margin-bottom: 20px; padding: 8px 4px 4px; }
    .outcome-stat { flex: 1; padding: 4px 8px; }
    .outcome-stat-label { font-size: 11px; font-weight: 600; color: #5c6370; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .outcome-stat-value { font-size: 36px; font-weight: 700; line-height: 1.1; color: #1e242e; letter-spacing: -0.02em; display: flex; align-items: baseline; gap: 8px; margin-bottom: 6px; }
    .outcome-stat-unit { font-size: 14px; font-weight: 500; color: #5c6370; letter-spacing: 0; }
    .outcome-stat-sub { font-size: 12px; color: #5c6370; line-height: 16px; }
    .outcome-stat-divider { width: 1px; background: #e8e8ec; margin: 4px 0; }

    /* Sample-conversations section under the hero */
    .outcomes-samples-header { margin-bottom: 10px; }
    .outcomes-samples-title { font-size: 14px; font-weight: 600; color: #1e242e; margin-bottom: 2px; }
    .outcomes-samples-sub { font-size: 12px; color: #5c6370; }

    /* Outcome tag on saved-conversation rows (Beat 7 samples) */
    .outcome-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: #147656; background: #e7f5ec; border: 1px solid #d7ecd7; padding: 3px 8px; border-radius: 999px; white-space: nowrap; }
    .outcome-tag-dot { width: 6px; height: 6px; border-radius: 50%; background: #147656; }
    .ticket-card .outcome-tag { margin-top: 2px; }

    /* Outcome block inside the ticket side-panel for saved threads */
    .saved-outcome-block { background: #f5fbf7; border: 1px solid #d7ecd7; border-radius: 10px; padding: 14px 16px; margin-top: 16px; }
    .saved-outcome-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; font-weight: 700; color: #147656; text-transform: uppercase; letter-spacing: 0.04em; }
    .saved-outcome-title { font-size: 14px; font-weight: 600; color: #1e242e; margin-bottom: 4px; }
    .saved-outcome-detail { font-size: 12px; color: #5c6370; line-height: 17px; }

    /* Edge-case filter chip on the eval table */
    .edge-filter-bar { display: flex; align-items: center; gap: 8px; padding: 0 4px 10px; animation: fadeInUp 300ms cubic-bezier(0.6, 0, 0, 1); }
    .edge-filter-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 6px 4px 10px; background: #fef3e2; border: 1px solid #fcd9a8; border-radius: 999px; font-size: 11px; font-weight: 600; color: #b45309; letter-spacing: 0.01em; }
    .edge-filter-chip-dot { width: 6px; height: 6px; border-radius: 50%; background: #b45309; }
    .edge-filter-clear { background: transparent; border: none; color: #b45309; cursor: pointer; font-size: 14px; line-height: 1; padding: 0 6px; border-radius: 999px; height: 18px; display: inline-flex; align-items: center; justify-content: center; }
    .edge-filter-clear:hover { background: #fcd9a8; }

    /* Ticket Cards — list style */
    .ticket-list { border: 1px solid #e8e8ec; border-radius: 10px; overflow: hidden; background: #fff; }
    .ticket-card { background: #fff; border-bottom: 1px solid #f0f0f4; cursor: pointer; }
    .ticket-card:last-child { border-bottom: none; }
    .ticket-card.open { background: #fafafa; }
    .ticket-header { padding: 14px 16px; cursor: pointer; display: flex; align-items: center; transition: background 150ms; gap: 12px; }
    .ticket-header:hover { background: #fafafa; }
    .ticket-header-avatar { width: 32px; height: 32px; border-radius: 50%; background: #e8e8ec; color: #5c6370; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ticket-header-left { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .ticket-header-title-row { display: flex; align-items: center; gap: 8px; }
    .ticket-header-name { font-size: 14px; font-weight: 600; line-height: 20px; color: #1e242e; }
    .priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .priority-dot.critical { background: #e5484d; }
    .priority-dot.high { background: #f5a524; }
    .priority-dot.medium { background: #eab308; }
    .priority-label { font-size: 13px; color: #5c6370; font-weight: 400; }
    .ticket-header-subject { font-size: 13px; color: #5c6370; line-height: 18px; letter-spacing: 0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ticket-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .ticket-tag { font-size: 11px; font-weight: 500; letter-spacing: 0.02em; padding: 3px 10px; border-radius: 999px; background: #f1f2f4; color: #5c6370; border: 1px solid #e8e8ec; }
    .ticket-tag.vip { background: #f1f2f4; color: #5c6370; }
    .ticket-tag.clv { background: #f1f2f4; color: #5c6370; }
    .ticket-time { font-size: 13px; color: #8a8f98; font-weight: 400; margin-left: 4px; }
    .ticket-content { padding: 0 16px; max-height: 0; overflow: hidden; transition: max-height 400ms cubic-bezier(0.6, 0, 0, 1); background: #fff; }
    .ticket-card.open .ticket-content { max-height: 600px; padding: 16px; border-top: 1px solid #f0f0f4; }

    /* Chat bubble (customer message) */
    .chat-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 14px; }
    .chat-avatar { width: 28px; height: 28px; border-radius: 50%; background: #e8e8ec; color: #5c6370; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chat-bubble { background: #f5f6f7; border-radius: 12px 12px 12px 2px; padding: 10px 12px; font-size: 13px; line-height: 20px; color: #1e242e; max-width: 85%; }

    /* Side-by-side response comparison */
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .compare-col { border-radius: 10px; padding: 10px 12px; font-size: 13px; line-height: 20px; display: flex; flex-direction: column; gap: 6px; }
    .compare-col.current { background: #f7f8f9; border: 1px solid #e8e8ec; border-left: 3px solid #9ca3af; }
    .compare-col.proposed { background: #f0fbf6; border: 1px solid #b8ecd8; border-left: 3px solid #147656; }
    .compare-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }
    .compare-label.current { color: #5c6370; }
    .compare-label.proposed { color: #147656; }
    .compare-icon { width: 12px; height: 12px; }
    .compare-text { color: #1e242e; }

    /* Inline diff */
    .diff-remove { background: #e8e8ec; color: #5c6370; text-decoration: line-through; padding: 1px 3px; border-radius: 3px; }
    .diff-add { background: #d7f5e7; color: #0f5a3f; padding: 1px 3px; border-radius: 3px; font-weight: 500; }

    .highlight { background: #f1ecff; padding: 1px 4px; border-radius: 3px; color: #7E55F6; font-weight: 500; }

    /* Ticket thread side panel */
    .ticket-panel-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.08); z-index: 100; opacity: 0; transition: opacity 200ms ease; pointer-events: none; }
    .ticket-panel-backdrop.open { opacity: 1; pointer-events: auto; }
    .ticket-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 520px; background: #fff; z-index: 101; box-shadow: -8px 0 32px rgba(0,0,0,0.10); transform: translateX(100%); transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1); display: flex; flex-direction: column; overflow: hidden; }
    .ticket-panel.open { transform: translateX(0); }
    .ticket-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #e8e8ec; flex-shrink: 0; gap: 12px; }
    .ticket-panel-header-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
    .ticket-panel-avatar { width: 32px; height: 32px; border-radius: 50%; background: #e8e8ec; color: #5c6370; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ticket-panel-title-stack { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
    .ticket-panel-name { font-size: 15px; font-weight: 600; color: #1e242e; }
    .ticket-panel-meta { font-size: 12px; color: #8a8f98; display: flex; align-items: center; gap: 6px; }
    .ticket-panel-vip { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; padding: 2px 6px; border-radius: 4px; background: #f1f2f4; color: #5c6370; border: 1px solid #e8e8ec; }
    .ticket-panel-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .ticket-panel-nav { display: flex; align-items: center; gap: 4px; }
    .ticket-panel-nav-btn, .ticket-panel-close { width: 28px; height: 28px; border: 1px solid #e8e8ec; background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #5c6370; transition: all 120ms; }
    .ticket-panel-close { border: none; }
    .ticket-panel-nav-btn:hover { border-color: #7E55F6; color: #7E55F6; }
    .ticket-panel-close:hover { background: #f5f6f7; color: #1e242e; }
    .ticket-panel-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .ticket-panel-subject { padding: 12px 20px; border-bottom: 1px solid #f0f0f4; font-size: 13px; color: #5c6370; background: #fafafa; }
    .ticket-panel-subject strong { color: #1e242e; font-weight: 600; }
    .ticket-panel-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; background: #fafafa; }

    .thread-msg { display: flex; gap: 10px; align-items: flex-start; }
    .thread-msg.outbound { flex-direction: row-reverse; }
    .thread-avatar { width: 28px; height: 28px; border-radius: 50%; font-size: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .thread-avatar.customer { background: #e8e8ec; color: #5c6370; }
    .thread-avatar.agent { background: #f1ecff; color: #7E55F6; }
    .thread-bubble-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 78%; }
    .thread-msg.outbound .thread-bubble-wrap { align-items: flex-end; }
    .thread-meta-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #8a8f98; padding: 0 4px; }
    .thread-meta-author { font-weight: 600; color: #5c6370; }
    .thread-bubble { padding: 10px 14px; font-size: 13px; line-height: 20px; color: #1e242e; border-radius: 14px; }
    .thread-bubble.customer { background: #fff; border: 1px solid #e8e8ec; border-bottom-left-radius: 4px; }
    .thread-bubble.agent-current { background: #fff; border: 1px solid #e8e8ec; border-bottom-right-radius: 4px; }

    .coaching-block { background: #fff; border: 1px solid #d7ecd7; border-radius: 10px; padding: 14px; margin-top: 4px; }
    .coaching-header { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #147656; margin-bottom: 8px; }
    .coaching-icon { width: 14px; height: 14px; }
    .coaching-text { font-size: 13px; line-height: 20px; color: #1e242e; }

    .thread-divider { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
    .thread-divider-line { flex: 1; height: 1px; background: #e8e8ec; }
    .thread-divider-label { font-size: 11px; color: #8a8f98; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }

    /* Insight Cards */
    .insight-card {
      background: #fff; border-radius: 12px; border: 1px solid #00000014;
      box-shadow: 0px 2px 20px 0px rgba(0,0,0,0.04); padding: 24px;
      display: flex; gap: 24px; align-items: stretch;
      animation: fadeInUp 400ms cubic-bezier(0.6, 0, 0, 1) backwards;
      cursor: pointer; transition: all 150ms cubic-bezier(0.9, 0, 0, 1);
    }
    .insight-card:hover { border-color: #7E55F6; box-shadow: 0px 2px 20px 0px rgba(0,0,0,0.08); }
    .insight-left { flex: 1; display: flex; flex-direction: column; gap: 12px; min-width: 0; }
    .insight-right { width: 220px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; }
    .insight-badge { display: inline-flex; align-self: flex-start; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; }
    .insight-badge.opportunity { background: #f1ecff; color: #7E55F6; }
    .insight-badge.alert { background: #fde8ec; color: #c4314b; }
    .insight-badge.success { background: #e9fbf5; color: #147656; }
    .insight-title { font-size: 14px; font-weight: 600; line-height: 20px; color: #1e242e; }
    .insight-body { font-size: 13px; line-height: 20px; color: #5c6370; }
    .insight-body strong { color: #1e242e; font-weight: 600; }
    .insight-metrics { display: flex; gap: 20px; margin-top: 4px; }
    .insight-metric { display: flex; flex-direction: column; gap: 2px; }
    .insight-metric-label { font-size: 11px; font-weight: 500; letter-spacing: 0.01em; color: #5c6370; }
    .insight-metric-row { display: flex; align-items: center; gap: 4px; }
    .insight-metric-value { font-size: 18px; font-weight: 600; line-height: 24px; color: #1e242e; }
    .insight-metric-delta { display: inline-flex; align-items: center; gap: 2px; }
    .insight-metric-delta svg { width: 10px; height: 10px; }
    .insight-metric-delta span { font-size: 11px; font-weight: 500; }
    .insight-chart { width: 100%; height: 100%; min-height: 100px; }

    /* Signal bar */
    .signal-bar { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: #f5f6f7; border-radius: 8px; margin-bottom: 6px; }
    .signal-bar:last-child { margin-bottom: 0; }
    .signal-label { font-size: 13px; color: #1e242e; font-weight: 500; flex: 1; }
    .signal-count { font-size: 13px; font-weight: 600; color: #7E55F6; }
    .signal-fill { height: 6px; border-radius: 3px; background: #7E55F6; }
    .signal-track { flex: 1; height: 6px; border-radius: 3px; background: #e8e8ec; overflow: hidden; }

    /* Edge case card */
    .edge-case { display: flex; gap: 12px; padding: 12px 14px; background: #fef3e2; border-radius: 8px; margin-bottom: 8px; }
    .edge-case:last-child { margin-bottom: 0; }
    .edge-case-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .edge-case-content { flex: 1; }
    .edge-case-quote { font-size: 13px; font-style: italic; color: #1e242e; line-height: 18px; margin-bottom: 4px; }
    .edge-case-explain { font-size: 12px; color: #b45309; line-height: 16px; }

    /* Eval flag */
    .eval-flag { display: flex; gap: 10px; align-items: flex-start; padding: 12px; border-radius: 8px; margin-top: 12px; }
    .eval-flag.warning { background: #fef3e2; }
    .eval-flag.success { background: #e9fbf5; }
    .eval-flag.error { background: #fde8ec; }
    .eval-flag-icon { font-size: 16px; flex-shrink: 0; }
    .eval-flag-text { font-size: 13px; line-height: 18px; }
    .eval-flag.warning .eval-flag-text { color: #b45309; }
    .eval-flag.success .eval-flag-text { color: #147656; }
    .eval-flag.error .eval-flag-text { color: #c4314b; }

    /* Skill editor — Notion/Gorgias style */
    .skill-editor-wrap { display: flex; gap: 0; margin-top: 12px; border: 1px solid #e8e8ec; border-radius: 10px; overflow: hidden; }
    .skill-editor { flex: 1; background: #fff; display: flex; flex-direction: column; min-width: 0; }
    .skill-editor + .skill-editor { border-left: 1px solid #e8e8ec; }
    .skill-editor-tab { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #e8e8ec; background: #fafafa; }
    .skill-editor-tab-label { font-size: 12px; font-weight: 600; letter-spacing: 0.02em; }
    .skill-editor-tab-label.before { color: #5c6370; }
    .skill-editor-tab-label.after { color: #147656; }
    .skill-editor-tab-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; }
    .skill-editor-tab-badge.current { background: #f5f6f7; color: #5c6370; }
    .skill-editor-tab-badge.updated { background: #e9fbf5; color: #147656; }
    .skill-editor-toolbar { display: flex; align-items: center; gap: 2px; padding: 6px 12px; border-bottom: 1px solid #f0f0f4; }
    .toolbar-btn { width: 26px; height: 26px; border: none; background: transparent; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #5c6370; cursor: default; font-size: 13px; font-weight: 600; font-family: 'Inter', serif; }
    .toolbar-sep { width: 1px; height: 16px; background: #e8e8ec; margin: 0 4px; }
    .toolbar-dropdown { display: flex; align-items: center; gap: 4px; padding: 3px 8px; border: 1px solid #e8e8ec; border-radius: 6px; font-size: 11px; font-weight: 500; color: #5c6370; background: #fff; margin-left: auto; cursor: default; }
    .toolbar-dropdown svg { width: 12px; height: 12px; }
    .toolbar-dropdown + .toolbar-dropdown { margin-left: 4px; }
    .skill-editor-body { padding: 16px; font-size: 13px; line-height: 22px; color: #1e242e; flex: 1; }
    .skill-editor-body .step-heading { font-size: 14px; font-weight: 700; margin: 16px 0 6px; color: #1e242e; }
    .skill-editor-body .step-heading:first-child { margin-top: 0; }
    .skill-editor-body p { margin: 4px 0; font-size: 13px; line-height: 22px; }
    .skill-editor-body .kw { font-weight: 700; color: #1e242e; }

    const infoSvg = `<svg class="metric-info" viewBox="0 0 16 16" fill="none"><path d="M8 7.37V10.52M8 13.67C4.87 13.67 2.33 11.13 2.33 8C2.33 4.87 4.87 2.33 8 2.33C11.13 2.33 13.67 4.87 13.67 8C13.67 11.13 11.13 13.67 8 13.67ZM8.03 5.48V5.54L7.97 5.54V5.48H8.03Z" stroke="#5C6370" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const trendUpSvg = (color) => `<svg viewBox="0 0 12 12" fill="none"><path d="M9.85 3.59L7.04 6.45C6.99 6.5 6.96 6.53 6.94 6.55C6.57 6.88 6.02 6.88 5.65 6.55C5.63 6.53 5.61 6.5 5.56 6.45C5.51 6.4 5.48 6.37 5.46 6.35C5.09 6.03 4.54 6.03 4.17 6.35C4.15 6.37 4.13 6.4 4.08 6.45L2.15 8.41M9.85 3.59V6.48M9.85 3.59H6.96" stroke="${color}" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const trendDownSvg = (color) => `<svg viewBox="0 0 12 12" fill="none"><path d="M9.85 8.41L7.04 5.55C6.99 5.5 6.96 5.47 6.94 5.45C6.57 5.12 6.02 5.12 5.65 5.45C5.63 5.47 5.61 5.5 5.56 5.55C5.51 5.6 5.48 5.63 5.46 5.65C5.09 5.97 4.54 5.97 4.17 5.65C4.15 5.63 4.13 5.6 4.08 5.55L2.15 3.59M9.85 8.41V5.52M9.85 8.41H6.96" stroke="${color}" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    const metricCard = (label, value, delta, delay, variant) => {
      let color = '#147656', svg = trendUpSvg(color);
      if (variant === 'negative') { color = '#c4314b'; svg = trendDownSvg(color); }
      else if (variant === 'negative-up') { color = '#c4314b'; svg = trendUpSvg(color); }

      else if (variant === 'purple-up') { color = '#7E55F6'; svg = trendUpSvg(color); }
      const deltaHtml = variant === 'plain'
        ? `<span class="metric-delta"><span style="color:#5c6370">${delta}</span></span>`
        : `<span class="metric-delta">${svg}<span style="color:${color}">${delta}</span></span>`;
      return `

    const insightMetric = (label, value, delta, color = '#c4314b', direction = 'up') => {

        <!-- Divider -->

        <!-- Metrics -->

          </div>
          <div class="dash-metric" style="animation-delay:180ms">
            <div class="dash-metric-label">Customer satisfaction</div>
            <div style="display:flex;align-items:center;gap:10px;">
              <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="11" fill="none" stroke="#e8e8ec" stroke-width="3.5"/><circle cx="14" cy="14" r="11" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-dasharray="17.3 51.8" stroke-dashoffset="-34.5" stroke-linecap="round"/><circle cx="14" cy="14" r="11" fill="none" stroke="#22c55e" stroke-width="3.5" stroke-dasharray="34.5 34.6" stroke-dashoffset="0" stroke-linecap="round"/><circle cx="14" cy="14" r="11" fill="none" stroke="#ef4444" stroke-width="3.5" stroke-dasharray="5.8 63.3" stroke-dashoffset="-52" stroke-linecap="round"/></svg>
              <span class="dash-metric-value">4.3/5</span>
            </div>
            <div class="dash-metric-delta positive">${trendUpSvg('#147656')} from brand voice tweaks</div>

        </div>

        <!-- Insights -->
        <div class="home-insights-header">
          <div class="section-heading">
            <span class="section-heading-title">Insights</span>
            <span class="section-heading-count">2</span>
          </div>
        </div>
        <div class="home-insights">
          <div class="landing-insight" style="animation-delay:250ms" onclick="openTask(1)">
            <div class="landing-insight-badges">
              <span class="landing-insight-badge tracking">Tracking</span>
            </div>
            <div class="landing-insight-title">5 of 14 cancellations mention delivery frequency</div>
            <div class="landing-insight-body">Customers are saying “too often,” “can’t keep up,” and “every two weeks is too much.” These may not be product-dissatisfied — they might be cadence-dissatisfied. I’m tracking this pattern and will have more data by end of week.</div>
            <div class="landing-insight-time">Last 24 hours</div>
          </div>
          <div class="landing-insight" style="animation-delay:350ms">
            <div class="landing-insight-badges">
              <span class="landing-insight-badge alert">Alert</span>

            <div class="landing-insight-body">4 customers asked whether their bouquet is safe for a recipient’s pet. I don’t have pet safety data in my product knowledge, so I escalated all 4. These follow the same resolution pattern.</div>

    };

        // Task detail navigation
    const openTask = (taskId) => {
      state.taskDetail = taskId;
      state.conversationBeat = 0;

      // Collapse sidebar
      document.querySelector('.sidebar').classList.add('collapsed');

      // Switch from home view to task view

    const renderTaskDetail = (taskId) => {
      const task = tasks.find(t => t.id === taskId);
      const header = document.getElementById('leftHeader');
      header.style.cssText = 'flex-direction:column;align-items:flex-start;gap:4px;height:auto;padding:24px 24px 16px;';
      header.innerHTML = `
        <div style="display:flex;align-items:center;gap:12px;cursor:pointer;" onclick="backToHome()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2.75 8L5.67 10.92M2.75 8L5.67 5.08M2.75 8H13.25" stroke="#7E55F6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>

      const leftBody = document.getElementById('leftBody');
      leftBody.innerHTML = `
        <div class="left-body-top"></div>
        <div class="left-body-content" id="leftContent">
          <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;justify-content:flex-end;">

          </div>
        </div>
        <div class="left-body-input">
          <div class="input-card">
            <div class="input-card-text">Ask anything</div>
            <div class="input-card-buttons">
              <button class="input-icon-btn light">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3.5 8H8M8 8H12.5M8 8V12.5M8 8V3.5" stroke="#1E242E" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>

              <button class="input-icon-btn dark">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2.75L5.08 5.67M8 2.75L10.92 5.67M8 2.75V13.25" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>

      advanceConversation();
    };

    const scrollConv = () => {
      const wrapper = document.getElementById('conversation')?.parentElement;
      if (wrapper) setTimeout(() => wrapper.scrollTop = wrapper.scrollHeight, 50);
    };

    // Typewriter queue — ensures messages + buttons appear sequentially
    let typewriterBusy = false;
    const typewriterQueue = [];

    const processTypewriterQueue = () => {
      if (typewriterBusy || typewriterQueue.length === 0) return;
      const job = typewriterQueue.shift();
      typewriterBusy = true;
      typewriterHTML(job.el, job.html, job.speed, () => {
        typewriterBusy = false;
        if (job.onDone) job.onDone();
        processTypewriterQueue();
      });
    };

    const createConversationMessage = (text, isUser = false) => {
      const msg = h('div', isUser ? 'message message-user' : 'message');
      if (isUser) {
        msg.innerHTML = `<div class="user-bubble">${text}</div>`;
      } else {
        const inner = h('div', 'agent-msg regular-md');
        msg.appendChild(inner);
        msg._typewriterTarget = inner;
        msg._typewriterText = text;
      }
      return msg;
    };

    // Start typewriter on an agent message, returns promise
    const startTypewriter = (msg, onDone) => {
      if (msg._typewriterTarget) {
        typewriterQueue.push({ el: msg._typewriterTarget, html: msg._typewriterText, speed: 8, onDone });
        processTypewriterQueue();
      } else if (onDone) {
        onDone();
      }
    };

    // Typewriter that respects HTML tags, calls onComplete when done
    const typewriterHTML = (el, html, speed, onComplete) => {
      el.innerHTML = '';
      let i = 0;
      const len = html.length;
      let buffer = '';
      let frameCount = 0;

      const tick = () => {
        if (i >= len) {
          el.innerHTML = buffer;
          scrollConv();
          if (onComplete) onComplete();
          return;
        }
        // Consume multiple chars per frame for speed
        let charsThisFrame = 0;
        const charsPerFrame = 2;
        while (charsThisFrame < charsPerFrame && i < len) {
          if (html[i] === '<') {
            const closeIdx = html.indexOf('>', i);
            if (closeIdx !== -1) { buffer += html.substring(i, closeIdx + 1); i = closeIdx + 1; }
            else { buffer += html[i]; i++; }
          } else if (html[i] === '&') {
            const semiIdx = html.indexOf(';', i);
            if (semiIdx !== -1 && semiIdx - i < 8) { buffer += html.substring(i, semiIdx + 1); i = semiIdx + 1; }
            else { buffer += html[i]; i++; }
          } else {
            buffer += html[i]; i++;
            charsThisFrame++;
          }
        }
        el.innerHTML = buffer;
        frameCount++;
        if (frameCount % 5 === 0) scrollConv();
        requestAnimationFrame(() => setTimeout(tick, speed));
      };
      tick();
    };

    const createPromptButtons = (buttons, onSelect) => {
      const container = h('div', 'prompt-buttons');
      let clicked = false;
      buttons.forEach((text, i) => {
        const btn = h('button', 'prompt-btn', text);
        btn.style.animationDelay = (i * 100) + 'ms';
        btn.onclick = () => {
          if (clicked) return;
          clicked = true;
          container.remove();
          onSelect(text, btn);
        };
        container.appendChild(btn);
      });
      return container;
    };

    const selectPrompt = (text, nextBeat) => {
      document.querySelectorAll('#conversation .prompt-buttons, #conversation .decision-card, #conversation .multiselect-card').forEach(el => el.remove());
      state.lastSelectedText = text;
      state.conversationBeat = nextBeat;
      advanceConversation();

    // Multi-select scorer picker — additive checkboxes + primary/secondary terminal actions.

    const createScorerPicker = (title, options, onSubmit) => {
      const card = h('div', 'multiselect-card');
      if (title) card.appendChild(h('div', 'multiselect-title', title));
      const selected = new Set();
      const checkHTML = '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2.5 5.5l2 2 4-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      options.forEach(opt => {
        const row = document.createElement('div');
        row.className = 'multiselect-row';
        row.innerHTML = `
          <span class="multiselect-checkbox">${checkHTML}</span>
          <span class="multiselect-content">
            <span class="multiselect-label">${opt.label}<span class="multiselect-badge">Custom</span></span>
            <span class="multiselect-desc">${opt.desc || ''}</span>
          </span>
        `;
        row.onclick = () => {
          if (selected.has(opt.key)) {
            selected.delete(opt.key);
            row.classList.remove('checked');
          } else {
            selected.add(opt.key);
            row.classList.add('checked');
          }
        };
        card.appendChild(row);
      });

      const actions = document.createElement('div');
      actions.className = 'multiselect-actions';
      const skipBtn = document.createElement('button');
      skipBtn.type = 'button';
      skipBtn.className = 'multiselect-secondary';
      skipBtn.textContent = 'Skip for now';
      const pubBtn = document.createElement('button');
      pubBtn.type = 'button';
      pubBtn.className = 'multiselect-primary';
      pubBtn.textContent = 'Publish now';

      skipBtn.onclick = () => { if (locked) return; locked = true; onSubmit([], 'skip'); };
      pubBtn.onclick = () => { if (locked) return; locked = true; onSubmit(Array.from(selected), 'publish'); };
      actions.appendChild(skipBtn);
      actions.appendChild(pubBtn);
      card.appendChild(actions);
      return card;

    // Options: { key, icon, label, desc, dimmed?, persist?, completed? }
    //  - persist: true keeps the card in place after click (e.g. "Investigate" — we just mark
    //    that row completed and let the user still pick Publish or Refine).
    const createDecisionCard = (title, options, onSelect) => {
      const card = h('div', 'decision-card');
      if (title) card.appendChild(h('div', 'decision-card-title', title));
      let locked = false;

      const chevHTML = '<svg class="decision-row-chev" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2l3 3-3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      const checkHTML = '<svg class="decision-row-chev" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7l3 3 5-6" stroke="#147656" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      options.forEach(opt => {
        const row = document.createElement('button');
        row.type = 'button';
        row.className = 'decision-row' + (opt.dimmed ? ' dimmed' : '') + (opt.completed ? ' completed' : '');
        row.innerHTML = `
          <span class="decision-row-icon">${opt.icon || ''}</span>
          <span class="decision-row-content">
            <span class="decision-row-label">${opt.label}</span>
            ${opt.desc ? `<span class="decision-row-desc">${opt.desc}</span>` : ''}
          </span>
          ${opt.completed ? checkHTML : chevHTML}
        `;
        if (!opt.completed) {
          row.onclick = () => {
            if (locked) return;
            if (opt.persist) {
              // Mark this row completed in place; keep the rest of the card live.
              row.classList.add('completed');
              row.classList.remove('dimmed');
              const chev = row.querySelector('.decision-row-chev');
              if (chev) chev.outerHTML = checkHTML;
              row.onclick = () => onSelect(opt.key, card, row, true); // re-click = re-trigger
              onSelect(opt.key, card, row, false);
            } else {
              locked = true;
              onSelect(opt.key, card, row, false);
            }

        card.appendChild(row);
