<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #root { height: 100vh; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module" src="./gorgias-vision-v3.jsx"></script>
  <script type="text/babel">
    // Wait for the JSX to be loaded and transpiled
    const checkAndRender = () => {
      if (window.__APP__) {
        const { useState } = React;
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.__APP__));
      } else {
        setTimeout(checkAndRender, 100);
      }
    };
    checkAndRender();
  </script>
